name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prepare:
    name: Prepare workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Archive prepared workspace
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='dist' \
            --exclude='coverage' \
            -czf prepared-workspace.tar.gz .

      - name: Upload prepared workspace archive
        uses: actions/upload-artifact@v4
        with:
          name: prepared-workspace
          path: prepared-workspace.tar.gz
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Extract prepared workspace
        run: tar -xzf prepared-workspace.tar.gz

      - name: Run ESLint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Extract prepared workspace
        run: tar -xzf prepared-workspace.tar.gz

      - name: Check Prettier formatting
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Extract prepared workspace
        run: tar -xzf prepared-workspace.tar.gz

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Extract prepared workspace
        run: tar -xzf prepared-workspace.tar.gz

      - name: Build production bundle
        run: npm run build
